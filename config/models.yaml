# Model registry for UPSC Bench
# Each model key maps to its OpenRouter model identifier.
# Runner defaults are applied automatically — no need to repeat them per model.

models:
  gpt5:
    name: "openrouter/openai/gpt-5.2"
  gpt5_4:
    name: "openrouter/openai/gpt-5.4"
  claude_opus:
    name: "openrouter/anthropic/claude-opus-4.6"
  gemini_3_pro:
    name: "openrouter/google/gemini-3.1-pro-preview"
  gemini_flash:
    name: "openrouter/google/gemini-2.5-flash"
  gemini_3_flash:
    name: "openrouter/google/gemini-3-flash-preview"

defaults:
  prelims:
    input: "data/processed/upsc_bench.json"
    db: "db/benchmark_results.db"
    output_dir: "results/raw"
    temperature: 0.0
    max_tokens: 4096
    supports_vision: true
  mains:
    input: "data/mains_questions/mains_2025.json"
    db: "db/mains_benchmark.db"
    output_dir: "results/raw"
    temperature: 0.0
    max_tokens: 8192
    supports_vision: false
